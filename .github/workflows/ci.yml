name: CI

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'
      - '.claude-plugin/**'
      - '.mcp.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'
      - '.claude-plugin/**'
      - '.mcp.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          echo "Validating JSON files..."
          find . -name "*.json" -not -path "./.git/*" | while read f; do
            python3 -m json.tool "$f" > /dev/null && echo "OK: $f" || echo "FAIL: $f"
          done

      - name: Check plugin structure
        run: |
          echo "Checking required files..."
          for f in README.md LICENSE; do
            if [ -f "$f" ]; then echo "OK: $f"; else echo "MISSING: $f"; fi
          done
          echo ""
          echo "Skills: $(find skills -name '*.md' 2>/dev/null | wc -l)"
          echo "Agents: $(find agents -name '*.md' 2>/dev/null | wc -l)"
